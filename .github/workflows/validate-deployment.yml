name: Validate Deployment

on:
  pull_request:
    paths:
      - '.github/workflows/deploy-dev.yml'
      - '.github/workflows/validate-deployment.yml'
      - '.github/deploy/**'
      - '.github/scripts/deploy-firebase-hosting.mjs'
      - '.github/DEPLOYMENT_SETUP.md'
      - '.github/deploy-dev.env.example'
      - '.dockerignore'
      - 'Dockerfile'
      - 'firebase.json'
      - 'nest-cli.json'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'src/**'
      - 'client/**'
  workflow_dispatch:

concurrency:
  group: validate-deployment-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate deploy build path
    runs-on: ubuntu-latest

    env:
      FIREBASE_HOSTING_DRY_RUN: true
      FIREBASE_PROJECT_ID: nido-api-9ed65
      FIREBASE_HOSTING_SITE: nido-api-9ed65
      VITE_FIREBASE_API_KEY: ${{ vars.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ vars.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ vars.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ vars.VITE_FIREBASE_APP_ID }}
      VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL || 'https://nido-api-81555493719.us-east1.run.app' }}
      VITE_ADMIN_EMAILS: ${{ vars.VITE_ADMIN_EMAILS }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Validate deploy configuration
        run: |
          : "${VITE_FIREBASE_API_KEY:?Missing GitHub variable VITE_FIREBASE_API_KEY}"
          : "${VITE_FIREBASE_AUTH_DOMAIN:?Missing GitHub variable VITE_FIREBASE_AUTH_DOMAIN}"
          : "${VITE_FIREBASE_PROJECT_ID:?Missing GitHub variable VITE_FIREBASE_PROJECT_ID}"
          : "${VITE_FIREBASE_STORAGE_BUCKET:?Missing GitHub variable VITE_FIREBASE_STORAGE_BUCKET}"
          : "${VITE_FIREBASE_MESSAGING_SENDER_ID:?Missing GitHub variable VITE_FIREBASE_MESSAGING_SENDER_ID}"
          : "${VITE_FIREBASE_APP_ID:?Missing GitHub variable VITE_FIREBASE_APP_ID}"
          : "${VITE_ADMIN_EMAILS:?Missing GitHub variable VITE_ADMIN_EMAILS}"

      - name: Validate environment deploy config files
        run: |
          for config in .github/deploy/environments/*.env .github/deploy/environments/*.env.example; do
            [ -f "$config" ] || continue
            (
              set -a
              . "$config"
              set +a

              : "${PROJECT_ID:?Missing PROJECT_ID in $config}"
              : "${REGION:?Missing REGION in $config}"
              : "${SERVICE:?Missing SERVICE in $config}"
              : "${MIGRATION_JOB:?Missing MIGRATION_JOB in $config}"
              : "${REPO:?Missing REPO in $config}"
              : "${SQL_INSTANCE:?Missing SQL_INSTANCE in $config}"
              : "${FIREBASE_PROJECT_ID:?Missing FIREBASE_PROJECT_ID in $config}"
              : "${FIREBASE_HOSTING_SITE:?Missing FIREBASE_HOSTING_SITE in $config}"
              : "${RUNTIME_SERVICE_ACCOUNT:?Missing RUNTIME_SERVICE_ACCOUNT in $config}"
              : "${CLOUD_RUN_MEMORY:?Missing CLOUD_RUN_MEMORY in $config}"
              : "${CLOUD_RUN_CPU:?Missing CLOUD_RUN_CPU in $config}"
              : "${CLOUD_RUN_CONCURRENCY:?Missing CLOUD_RUN_CONCURRENCY in $config}"
              : "${CLOUD_RUN_TIMEOUT:?Missing CLOUD_RUN_TIMEOUT in $config}"
              : "${CLOUD_RUN_MIN_INSTANCES:?Missing CLOUD_RUN_MIN_INSTANCES in $config}"
              : "${CLOUD_RUN_MAX_INSTANCES:?Missing CLOUD_RUN_MAX_INSTANCES in $config}"
              : "${RUN_MIGRATIONS:?Missing RUN_MIGRATIONS in $config}"
              : "${DB_MIGRATIONS_RUN:?Missing DB_MIGRATIONS_RUN in $config}"
              : "${DB_MIGRATION_TRANSACTION_MODE:?Missing DB_MIGRATION_TRANSACTION_MODE in $config}"
              : "${DB_USER:?Missing DB_USER in $config}"
              : "${DB_NAME:?Missing DB_NAME in $config}"
              : "${ADMIN_EMAILS:?Missing ADMIN_EMAILS in $config}"
              : "${GCS_INGESTION_BUCKET:?Missing GCS_INGESTION_BUCKET in $config}"
              : "${GEMINI_MODEL:?Missing GEMINI_MODEL in $config}"
              : "${CONCERT_SYNC_GEMINI_ENABLED:?Missing CONCERT_SYNC_GEMINI_ENABLED in $config}"
              : "${CONCERT_SYNC_MAX_EVENTS_PER_JOB:?Missing CONCERT_SYNC_MAX_EVENTS_PER_JOB in $config}"
              : "${GOOGLE_CALENDAR_SERVICE_ACCOUNT_EMAIL:?Missing GOOGLE_CALENDAR_SERVICE_ACCOUNT_EMAIL in $config}"
              : "${CORS_ORIGINS:?Missing CORS_ORIGINS in $config}"
              : "${DB_PASSWORD_SECRET:?Missing DB_PASSWORD_SECRET in $config}"
              : "${FIREBASE_PRIVATE_KEY_SECRET:?Missing FIREBASE_PRIVATE_KEY_SECRET in $config}"
              : "${GEMINI_API_KEY_SECRET:?Missing GEMINI_API_KEY_SECRET in $config}"
              : "${GOOGLE_CALENDAR_PRIVATE_KEY_SECRET:?Missing GOOGLE_CALENDAR_PRIVATE_KEY_SECRET in $config}"

              case "$DB_MIGRATION_TRANSACTION_MODE" in
                all|each|none) ;;
                *) echo "Invalid DB_MIGRATION_TRANSACTION_MODE in $config" >&2; exit 1 ;;
              esac
            )
          done

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            client/package-lock.json

      - name: Install API dependencies
        run: npm ci

      - name: Install client dependencies
        run: npm ci --prefix client

      - name: Run focused API tests
        run: npm test -- user.service health.service concert-sync

      - name: Build API
        run: npm run build

      - name: Build client
        run: npm run build --prefix client

      - name: Validate Firebase Hosting REST deploy
        run: node .github/scripts/deploy-firebase-hosting.mjs
